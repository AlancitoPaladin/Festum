name: festum
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  stacked: ^3.4.4
  get_it: ^8.0.3
  dio: ^5.9.0
  retrofit: ^4.7.2
  json_annotation: ^4.9.0
  rive: ^0.13.20
  go_router: ^14.8.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  build_runner: ^2.6.0
  retrofit_generator: ^10.1.2
  json_serializable: ^6.11.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icon/icon_foreground.png"
  adaptive_icon_background: "#F5F5F0"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_foreground_inset: 0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/rive/
